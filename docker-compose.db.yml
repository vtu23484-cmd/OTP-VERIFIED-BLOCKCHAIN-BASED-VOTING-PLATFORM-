version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: voting-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: votingdb
      MYSQL_USER: votinguser
      MYSQL_PASSWORD: votingpass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - voting-network

  redis:
    image: redis:7-alpine
    container_name: voting-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - voting-network

volumes:
  mysql-data:
  redis-data:

networks:
  voting-network:
    external: true
